<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Moitié supérieure rouge -->
  <path d="M 5,50 A 45,45 0 0 1 95,50 Z" fill="#E53935"/>
  <!-- Moitié inférieure blanche -->
  <path d="M 5,50 A 45,45 0 0 0 95,50 Z" fill="#FFFFFF"/>
  <!-- Bande centrale noire -->
  <rect x="0" y="46" width="100" height="8" fill="#333333"/>
  <!-- Cercle extérieur du bouton -->
  <circle cx="50" cy="50" r="14" fill="#333333"/>
  <!-- Cercle intérieur du bouton -->
  <circle cx="50" cy="50" r="10" fill="#FFFFFF"/>
  <!-- Point central -->
  <circle cx="50" cy="50" r="5" fill="#333333"/>
  <!-- Contour -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="#333333" stroke-width="5"/>
</svg>
